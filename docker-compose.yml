version: '3.8'

services:
  backend:
    build: .
    container_name: multimodal_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: multimodal_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
  uploads:
